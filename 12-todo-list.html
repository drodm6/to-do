<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODO List</title>
  <link rel="stylesheet" href="styles/12-prac.css" />
</head>
<body>
    
  <div class="app">
    <h1 class="title">TODO list</h1>

    <div class="input-row">
      <input type="text" id="todoText" class="todo-input" placeholder="What needs to get done?" />
      <input type="date" id="todoDate" class="date-input" />
      <button id="addBtn" class="add-btn">ADD</button>
    </div>

    <div id="todoContainer" class="todo-container">
      <!-- todo items get added here by JS -->
    </div>
  </div>

  <script src="scripts/12-prac.js"></script>
</body>
</html>
