<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODO List</title>
  <link rel="stylesheet" href="styles/12-prac.css" />
</head>
<body>
    
  <div class="app">
    <h1 class="title">TODO list</h1>

    <div class="input-row">
      <input type="text" id="todoText" class="todo-input" placeholder="What needs to get done?" />
      <input type="date" id="todoDate" class="date-input" />
      <button id="addBtn" class="add-btn">ADD</button>
    </div>

    <div id="todoContainer" class="todo-container">
      <!-- todo items get added here by JS -->
    </div>
  </div>



  <!-- edit popup, hidden until an edit button is clicked -->
<div id="editModal" class="modal-overlay hidden">
  <div class="modal-box">
    <h2 class="modal-title">Edit todo</h2>
    <input type="text" id="editTextInput" class="todo-input" />
    <input type="date" id="editDateInput" class="date-input" />
    <div class="modal-actions">
      <button id="applyEditBtn" class="add-btn">Apply</button>
      <button id="cancelEditBtn" class="delete-btn">Cancel</button>
    </div>
  </div>
</div>

  <script src="scripts/12-prac.js"></script>
</body>
</html>
